# Enable mouse support for scrolling, selecting panes, and resizing panes
set -g mouse on

# Enable extended keys (CSI u) for Shift+Enter/Ctrl+Enter support in CLI tools (like gemini-cli)
set -s extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'wezterm:extkeys'

# Ensure truecolor support is enabled for seamless rendering of hex colors
set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-256color:Tc"

# ==========================================
# EARTHY BAUHAUS HIGH-CONTRAST THEME
# ==========================================

# Colors referenced from Wezterm palette:
# Dark Clay (bg):   #1E1B18
# Sand/Cream (fg):  #E6DFD3
# Terracotta (red): #C05C46
# Ochre (yellow):   #C29B38
# Slate Blue:       #5C7285
# Sage Green:       #7A8B7B

# Status Bar Base Styling
set -g status-style bg=#1E1B18,fg=#E6DFD3

# Left Status: Highlight active session name in a bold Slate Blue block
set -g status-left '#[bg=#5C7285,fg=#E6DFD3,bold] #S #[default] '
set -g status-left-length 25

# Window List Styling: Clear gap and distinct high-contrast colors
set -g window-status-style fg=#E6DFD3,bg=#1E1B18
set -g window-status-format " #[fg=#7D97AE]#I#[fg=#E6DFD3]:#W "

# Active Window: Bright high-contrast Terracotta red block
set -g window-status-current-style bg=#C05C46,fg=#E6DFD3,bold
set -g window-status-current-format " #I:#W "

# Right Status: Show date and time in clean Sage Green
set -g status-right '#[fg=#7A8B7B,bg=#1E1B18,bold] %Y-%m-%d │ %H:%M '
set -g status-right-length 50

# Pane Divider Styling
# Inactive pane: Muted Slate Blue border
set -g pane-border-style fg=#5C7285
# Active pane: Bright Ochre Yellow border to make the active pane pop
set -g pane-active-border-style fg=#C29B38

# Command / Message Line Styling (when running tmux commands Prefix + :)
set -g message-style bg=#C05C46,fg=#E6DFD3,bold
